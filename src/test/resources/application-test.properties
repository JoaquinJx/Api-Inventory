spring.datasource.url=jdbc:h2:mem:inventory;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

jwt.secret=test-secret-key-test-secret-key-123456
jwt.expiration=900000
jwt.refresh-expiration=1209600000

app.cors.allowed-origins=http://localhost:4200
app.security.login.max-attempts=5
app.security.login.window-ms=60000
