services:
  - type: web
    name: inventory-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        value: "Inv3nt0ry@API#SecretKey2026!XpZ9qR7mK2wL5nB"
      - key: JWT_EXPIRATION_MS
        value: "900000"
      - key: JWT_REFRESH_EXPIRATION_MS
        value: "1209600000"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://frontend-inventory-ashen.vercel.app"
      - key: LOGIN_MAX_ATTEMPTS
        value: "5"
      - key: LOGIN_WINDOW_MS
        value: "60000"
      - key: DB_USERNAME
        fromDatabase:
          name: postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: postgres
          property: password
      - key: DB_HOST
        fromDatabase:
          name: postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: postgres
          property: database

databases:
  - name: postgres
    plan: free
    ipAllowList: []
