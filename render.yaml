services:
  - type: web
    name: inventory-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        value: your-super-secret-jwt-key-minimum-32-characters-long-please
      - key: JWT_EXPIRATION_MS
        value: "900000"
      - key: JWT_REFRESH_EXPIRATION_MS
        value: "1209600000"
      - key: CORS_ALLOWED_ORIGINS
        # Cambia esto a tu URL de frontend en Render
        value: "http://localhost:4200"
      - key: LOGIN_MAX_ATTEMPTS
        value: "5"
      - key: LOGIN_WINDOW_MS
        value: "60000"
      - key: DB_USERNAME
        fromDatabase:
          name: postgres
          property: username
      - key: DB_PASSWORD
        fromDatabase:
          name: postgres
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString

  - type: postgres
    name: postgres
    plan: free
    ipAllowList: []
